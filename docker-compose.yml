services:
  db:
    image: postgres:16
    container_name: algohaven-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-algohaven}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - algohaven_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0.11
    container_name: algohaven-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-algohaven_redis}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-algohaven_redis}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  algohaven_data:
  redis_data:
