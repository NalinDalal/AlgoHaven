services:
  db:
    image: postgres:16
    container_name: algohaven-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: algohaven
    ports:
      - "5432:5432"
    volumes:
      - algohaven_data:/var/lib/postgresql/data

volumes:
  algohaven_data: