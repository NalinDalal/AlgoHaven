services:
  db:
    image: postgres:16
    container_name: algohaven-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: algohaven
    ports:
      - "5432:5432"
    volumes:
      - algohaven_data:/var/lib/postgresql/data

  redis:
    image: redis:7.0.11
    container_name: algohaven-redis
    restart: unless-stopped
    ports:
      - "6379:6379"


volumes:
  algohaven_data:
